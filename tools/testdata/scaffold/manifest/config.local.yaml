app:
  name: handygo-web-local

server:
  name: http
  addr: ":8080"
  mode: debug
  readTimeout: 5s
  writeTimeout: 10s
  idleTimeout: 60s

logger:
  level: debug
  mode: dev
  # encoding options: json, console
  encoding: console
  timeFormat: "2006-01-02 15:04:05"
  outputPaths:
    - stdout
  errorOutputPaths:
    - stderr
  fileOutputPath: logs/app.log
  errorFileOutputPath: logs/error.log
  rotation:
    enabled: true
    maxSizeMB: 100
    maxAgeDays: 7
    maxBackups: 5
    localTime: true
    compress: false

database:
  name: database
  # Default SQLite configuration.
  driver: sqlite
  dsn: file:handygo-example.db?cache=shared
  # MySQL example:
  # driver: mysql
  # dsn: "mysql://user:password@127.0.0.1:3306/handygo?charset=utf8mb4&parseTime=True&loc=Local"
  # PostgreSQL example:
  # driver: postgres
  # dsn: "postgres://postgres:postgres@127.0.0.1:5432/handygo?sslmode=disable&TimeZone=Asia/Shanghai"
  maxIdleConns: 2
  maxOpenConns: 10
  connMaxLifetime: 1h
  logLevel: info

cache:
  enabled: false
  redis:
    name: redis
    addr: "127.0.0.1:6379"
    db: 0
    dialTimeout: 5s
    readTimeout: 3s
    writeTimeout: 3s
    poolSize: 10

auth:
  jwtSecret: "replace-this-secret-in-production"
  tokenTTL: 24h
  passwordCost: 10

worker:
  pool:
    name: local-worker-pool
    workers: 4
    queue: 64
  scheduler:
    name: local-scheduler
    location: Asia/Shanghai
    seconds: false

asynq:
  enabled: false
  client:
    name: asynq-client
  server:
    name: asynq-server
    concurrency: 10
    queues:
      critical: 6
      default: 3
      low: 1
  scheduler:
    name: asynq-scheduler
    location: Asia/Shanghai
